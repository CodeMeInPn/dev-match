min_version: 1.3.0

pre-commit:
  parallel: true
  commands:
    eslint:
      glob: '*.{ts,js}'
      run: yarn eslint --fix --max-warnings=0 {staged_files}

    prettier:
      glob: '*.{ts,js,json,md}'
      run: yarn prettier --write --ignore-unknown {staged_files}

    type-check:
      glob: '*.{ts}'
      run: yarn tsc --noEmit

test:
  commands:
    jest:
      glob: '*.{ts}'
      run: yarn jest {staged_files}
